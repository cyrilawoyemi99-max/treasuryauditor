name: Treasury Address Audit

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  audit:
    name: Audit Treasury Addresses
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install node-fetch cheerio

      - name: Run audit
        id: audit
        env:
          CANONICAL_ADDR: ${{ secrets.TREASURY_CANONICAL_ADDR }}
        run: node scripts/audit.js | tee audit-report.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: treasury-audit-${{ github.run_id }}
          path: audit-report.json

      - name: Fail on mismatch
        run: |
          MISMATCHES=$(node -e "
            const r = require('./audit-report.json');
            console.log(r.summary.mismatches);
          ")
          if [ "$MISMATCHES" -gt "0" ]; then
            echo "::error::Found $MISMATCHES treasury address mismatch(es)!"
            exit 1
          fi

      - name: Open GitHub issue on mismatch
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const report = require('./audit-report.json');
            const rows = report.results
              .filter(r => r.status === 'mismatch')
              .map(r => `| ${r.subdomain} | ${r.foundAddress} | ✗ MISMATCH |`)
              .join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Treasury address mismatch detected (${new Date().toISOString().slice(0,10)})`,
              labels: ['security', 'treasury-audit'],
              body: `## Treasury Audit Report\n\nRun: ${context.runId}\n\n| Subdomain | Address Found | Status |\n|---|---|---|\n${rows}\n\n**Canonical:** ${report.canonical}\n\nPlease sync all subdomains to the canonical address.`
            });
